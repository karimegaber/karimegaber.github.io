<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // 404 Error Handler for GitHub Pages SPA
      // Captures the failed route and redirects to root with the path as a query parameter
      (function() {
        var l = window.location;
        var p = l.pathname;
        var s = l.search;
        var h = l.hash;

        // Construct the new URL: root (/) + ?p=encodedPath
        // l.origin gives us https://domain.com
        var target = l.origin + '/?p=' + encodeURIComponent(p + s + h);

        // Perform the redirect
        l.replace(target);
      })();
    </script>
  </head>
  <body>
  </body>
</html>
